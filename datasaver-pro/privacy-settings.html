<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataSaver Pro - Privacy Settings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-dark: #0a0e27;
      --bg-darker: #050812;
      --s1: #1a1e3f;
      --s2: #252d5c;
      --txt: #b8b8d8;
      --txb: #e8e8ff;
      --accent: #4f6ef7;
      --success: #22d98a;
      --warning: #f7b900;
      --danger: #ff6b6b;
    }

    body {
      background: var(--bg-dark);
      color: var(--txt);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.5;
      overflow-x: hidden;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 0;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--s1), var(--s2));
      padding: 16px;
      border-bottom: 1px solid rgba(79, 110, 247, 0.2);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      font-size: 24px;
    }

    .header-title {
      flex: 1;
    }

    .header-title h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--txb);
      margin-bottom: 2px;
    }

    .header-subtitle {
      font-size: 11px;
      color: var(--txt);
    }

    /* Page Indicator */
    .page-indicator-container {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
      gap: 8px;
      background: var(--s1);
      border-bottom: 1px solid rgba(79, 110, 247, 0.1);
    }

    #pageIndicator {
      display: flex;
      gap: 8px;
    }

    .page-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--s2);
      border: 1px solid rgba(79, 110, 247, 0.3);
      color: var(--txt);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 11px;
      transition: all 0.2s;
    }

    .page-dot:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .page-dot.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(79, 110, 247, 0.3);
    }

    /* Privacy Page */
    .privacy-page {
      padding: 16px;
      min-height: 400px;
    }

    .privacy-page h2 {
      font-size: 18px;
      color: var(--txb);
      margin-bottom: 4px;
    }

    .page-subtitle {
      font-size: 12px;
      color: var(--txt);
      margin-bottom: 16px;
    }

    /* Privacy Settings List */
    .privacy-settings-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }

    /* Privacy Setting Item */
    .privacy-setting-item {
      background: var(--s1);
      border: 1px solid rgba(79, 110, 247, 0.2);
      border-radius: 6px;
      padding: 12px;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .privacy-setting-item:hover {
      border-color: rgba(79, 110, 247, 0.4);
      background: var(--s2);
    }

    .privacy-setting-item.disabled {
      opacity: 0.6;
      pointer-events: none;
    }

    /* Disabled Overlay */
    .disabled-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 107, 107, 0.15);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      border-radius: 6px;
    }

    .disabled-overlay span {
      background: rgba(255, 107, 107, 0.9);
      color: white;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
    }

    /* Setting Header */
    .setting-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }

    /* Toggle Switch */
    .privacy-toggle {
      position: relative;
      display: inline-flex;
      cursor: pointer;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .privacy-checkbox {
      display: none;
    }

    .toggle-slider {
      width: 40px;
      height: 24px;
      background: var(--s2);
      border-radius: 12px;
      display: inline-block;
      position: relative;
      transition: background 0.2s;
      border: 1px solid rgba(79, 110, 247, 0.2);
    }

    .toggle-slider::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: left 0.2s;
    }

    .privacy-checkbox:checked + .toggle-slider {
      background: var(--success);
      border-color: var(--success);
    }

    .privacy-checkbox:checked + .toggle-slider::after {
      left: 18px;
    }

    /* Setting Label */
    .setting-label {
      flex: 1;
    }

    .label-title {
      font-weight: 600;
      color: var(--txb);
      font-size: 13px;
      margin-bottom: 4px;
    }

    .label-toggle-status {
      display: flex;
      gap: 6px;
    }

    .status-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 3px;
      white-space: nowrap;
    }

    .status-badge.enabled {
      background: rgba(34, 217, 138, 0.2);
      color: var(--success);
    }

    .status-badge.disabled {
      background: rgba(255, 107, 107, 0.2);
      color: var(--danger);
    }

    /* Setting Description */
    .setting-description {
      margin-left: 52px;
    }

    .setting-description p {
      font-size: 11px;
      color: var(--txt);
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .setting-description p:last-child {
      margin-bottom: 0;
    }

    .disabled-note {
      color: var(--warning) !important;
      font-weight: 500;
    }

    /* Privacy Info Box */
    .privacy-info-box {
      background: linear-gradient(135deg, rgba(34, 217, 138, 0.1), rgba(79, 110, 247, 0.1));
      border: 1px solid rgba(34, 217, 138, 0.2);
      border-radius: 6px;
      padding: 12px;
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .info-icon {
      font-size: 20px;
      flex-shrink: 0;
    }

    .info-content {
      flex: 1;
      font-size: 11px;
    }

    .info-content h4 {
      color: var(--txb);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .info-content p {
      color: var(--txt);
      margin-bottom: 6px;
    }

    .info-content ul {
      list-style: none;
      margin-left: 0;
    }

    .info-content li {
      color: var(--txt);
      margin-bottom: 4px;
      padding-left: 16px;
      position: relative;
    }

    .info-content li::before {
      content: "•";
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    .info-content strong {
      color: var(--txb);
    }

    /* Page Navigation */
    .page-nav {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(79, 110, 247, 0.1);
    }

    .btn-next,
    .btn-prev {
      flex: 1;
      padding: 10px 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-next:hover,
    .btn-prev:hover {
      background: #3d5ae0;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(79, 110, 247, 0.3);
    }

    .btn-next:active,
    .btn-prev:active {
      transform: translateY(0);
    }

    /* Footer */
    .footer {
      background: var(--s1);
      padding: 12px 16px;
      border-top: 1px solid rgba(79, 110, 247, 0.1);
      font-size: 10px;
      color: var(--txt);
      text-align: center;
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 400px) {
      .setting-header {
        flex-direction: column;
      }

      .setting-description {
        margin-left: 0;
        margin-top: 8px;
      }

      .privacy-info-box {
        flex-direction: column;
      }
    }

    /* Loading State */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      color: var(--txt);
    }

    .spinner {
      border: 2px solid rgba(79, 110, 247, 0.2);
      border-top: 2px solid var(--accent);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-icon">🔒</div>
      <div class="header-title">
        <h1>Privacy Settings</h1>
        <div class="header-subtitle">Control your data protection</div>
      </div>
    </div>

    <!-- Page Indicator -->
    <div class="page-indicator-container">
      <div id="pageIndicator">
        <span class="page-dot active" data-page="1">1</span>
        <span class="page-dot" data-page="2">2</span>
      </div>
    </div>

    <!-- Privacy Settings Container -->
    <div id="privacySettings" class="privacy-settings-container">
      <div class="loading">
        <div class="spinner"></div>
        <span>Loading privacy settings...</span>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>
        ✅ <strong>Your data is safe</strong> - All settings are stored locally on your device
      </p>
      <p style="margin-top: 8px;">
        Learn more: <a href="DATA_SECURITY_PRIVACY.md" target="_blank">Data Security & Privacy</a>
      </p>
    </div>
  </div>

  <script src="privacy-pages.js"></script>
</body>
</html>
