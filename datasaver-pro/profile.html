<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DataSaver Pro — Profile</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-light: #f8f9fa;
    --bg-dark: #0a0a12;
    --s1-light: #ffffff;
    --s1-dark: #0f0f1e;
    --s2-light: #f3f3f7;
    --s2-dark: #131326;
    --border-light: #e0e0e8;
    --border-dark: #1e1e38;
    --accent: #4f6ef7;
    --green: #22d98a;
    --red: #f74f6e;
    --yellow: #f7b900;
    --txt-light: #333;
    --txt-dark: #b8b8d8;
    --txb-light: #000;
    --txb-dark: #eeeeff;
    --mono: 'Courier New', monospace;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-dark);
    color: var(--txt-dark);
    min-height: 100vh;
  }

  body.light {
    --bg: var(--bg-light);
    --s1: var(--s1-light);
    --s2: var(--s2-light);
    --border: var(--border-light);
    --txt: var(--txt-light);
    --txb: var(--txb-light);
  }

  body.dark {
    --bg: var(--bg-dark);
    --s1: var(--s1-dark);
    --s2: var(--s2-dark);
    --border: var(--border-dark);
    --txt: var(--txt-dark);
    --txb: var(--txb-dark);
  }

  body { background: var(--bg); color: var(--txt); }

  /* TOPBAR */
  .topbar {
    background: var(--s1);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 30px;
    height: 30px;
    background: linear-gradient(135deg, #2a3a8a, var(--accent));
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-name {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    color: var(--txb);
  }

  .topbar-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .theme-toggle {
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
    color: var(--txt);
    font-size: 12px;
    transition: all 0.2s;
  }

  .theme-toggle:hover {
    border-color: var(--accent);
  }

  /* PAGE */
  .page {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  /* SECTION */
  .section {
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    margin-bottom: 24px;
  }

  .section-title {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--txb);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title svg {
    width: 20px;
    height: 20px;
  }

  /* LICENSE STATUS CARD */
  .status-card {
    background: linear-gradient(135deg, rgba(79, 110, 247, 0.1), rgba(34, 217, 138, 0.05));
    border: 1px solid rgba(79, 110, 247, 0.2);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: center;
  }

  .status-main {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .status-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--txt);
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    width: fit-content;
    padding: 8px 12px;
    background: rgba(34, 217, 138, 0.15);
    border-radius: 6px;
    border: 1px solid rgba(34, 217, 138, 0.3);
  }

  .status-badge.trial {
    background: rgba(247, 185, 0, 0.15);
    border-color: rgba(247, 185, 0, 0.3);
  }

  .status-badge.expired {
    background: rgba(247, 79, 110, 0.15);
    border-color: rgba(247, 79, 110, 0.3);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
  }

  .status-badge.trial .status-dot {
    background: var(--yellow);
  }

  .status-badge.expired .status-dot {
    background: var(--red);
  }

  .status-text {
    font-size: 12px;
    color: var(--txb);
    font-weight: 500;
  }

  .trial-progress {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .trial-bar {
    height: 6px;
    background: var(--s2);
    border-radius: 3px;
    overflow: hidden;
  }

  .trial-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 3px;
    transition: width 0.3s;
  }

  .trial-text {
    font-size: 11px;
    color: var(--txt);
    font-family: var(--mono);
  }

  /* FORM SECTION */
  .form-group {
    margin-bottom: 20px;
  }

  .form-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--txb);
    margin-bottom: 6px;
    display: block;
  }

  .form-input, .form-textarea {
    width: 100%;
    padding: 10px 12px;
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--txt);
    font-family: inherit;
    font-size: 13px;
    transition: all 0.2s;
  }

  .form-input:focus, .form-textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.1);
  }

  .form-hint {
    font-size: 11px;
    color: var(--txt);
    margin-top: 4px;
  }

  /* BUTTONS */
  .btn {
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
  }

  .btn-primary:hover {
    background: #3d5add;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(79, 110, 247, 0.3);
  }

  .btn-secondary {
    background: var(--s2);
    color: var(--txt);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-danger {
    background: rgba(247, 79, 110, 0.15);
    color: var(--red);
    border: 1px solid rgba(247, 79, 110, 0.3);
  }

  .btn-danger:hover {
    background: rgba(247, 79, 110, 0.25);
  }

  .btn-success {
    background: rgba(34, 217, 138, 0.15);
    color: var(--green);
    border: 1px solid rgba(34, 217, 138, 0.3);
  }

  .btn-full {
    width: 100%;
  }

  /* USER INFO */
  .user-info {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .info-card {
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }

  .info-label {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--txt);
    margin-bottom: 6px;
  }

  .info-value {
    font-size: 13px;
    color: var(--txb);
    font-family: var(--mono);
    word-break: break-all;
  }

  /* SETTINGS GRID */
  .settings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 14px;
  }

  .setting-toggle {
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .setting-toggle:hover {
    border-color: var(--accent);
  }

  .setting-toggle input {
    margin: 0;
    width: 18px;
    height: 18px;
    cursor: pointer;
  }

  .setting-info {
    flex: 1;
  }

  .setting-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--txb);
    margin-bottom: 2px;
  }

  .setting-desc {
    font-size: 10px;
    color: var(--txt);
  }

  /* ALERTS */
  .alert {
    padding: 12px 14px;
    border-radius: 6px;
    margin-bottom: 16px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .alert-success {
    background: rgba(34, 217, 138, 0.15);
    border: 1px solid rgba(34, 217, 138, 0.3);
    color: var(--green);
  }

  .alert-error {
    background: rgba(247, 79, 110, 0.15);
    border: 1px solid rgba(247, 79, 110, 0.3);
    color: var(--red);
  }

  .alert-warning {
    background: rgba(247, 185, 0, 0.15);
    border: 1px solid rgba(247, 185, 0, 0.3);
    color: var(--yellow);
  }

  /* MODAL */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .modal.active {
    display: flex;
  }

  .modal-content {
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    max-width: 400px;
    width: 90%;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--txb);
    margin-bottom: 16px;
  }

  .modal-close {
    position: absolute;
    top: 12px;
    right: 12px;
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--txt);
  }

  /* LOADING STATE */
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(79, 110, 247, 0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    .section {
      padding: 20px;
    }

    .status-card {
      grid-template-columns: 1fr;
    }

    .user-info {
      grid-template-columns: 1fr;
    }

    .topbar {
      padding: 0 16px;
    }

    .page {
      padding: 20px 16px;
    }
  }
</style>
</head>
<body class="dark">

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div class="logo-name">DataSaver Pro</div>
  </div>
  <div class="topbar-controls">
    <button class="theme-toggle" id="themeToggle">🌙 Dark</button>
  </div>
</div>

<div class="page">

  <!-- LICENSE STATUS -->
  <div class="status-card" id="statusCard">
    <div class="status-main">
      <div class="status-label">License Status</div>
      <div class="status-badge trial" id="statusBadge">
        <span class="status-dot"></span>
        <span class="status-text" id="statusText">Trial Active</span>
      </div>
    </div>
    <div id="trialInfo">
      <div class="trial-progress">
        <div class="trial-bar">
          <div class="trial-fill" id="trialFill" style="width: 70%;"></div>
        </div>
        <div class="trial-text" id="trialText">23 days left in your trial</div>
      </div>
    </div>
  </div>

  <!-- ALERTS -->
  <div id="alertContainer"></div>

  <!-- USER PROFILE SECTION -->
  <div class="section" id="profileSection">
    <div class="section-title">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
      Your Profile
    </div>

    <div class="user-info" id="userInfo" style="display: none;">
      <div class="info-card">
        <div class="info-label">Username</div>
        <div class="info-value" id="infoUsername">—</div>
      </div>
      <div class="info-card">
        <div class="info-label">Email</div>
        <div class="info-value" id="infoEmail">—</div>
      </div>
      <div class="info-card">
        <div class="info-label">Plan</div>
        <div class="info-value" id="infoPlan">—</div>
      </div>
      <div class="info-card">
        <div class="info-label">License Expires</div>
        <div class="info-value" id="infoExpires">—</div>
      </div>
    </div>

    <form id="profileForm" style="display: none;">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-input" id="nameInput" placeholder="Your full name"/>
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="emailInput" placeholder="your@email.com"/>
      </div>

      <div class="form-group">
        <label class="form-label">License Key</label>
        <input type="text" class="form-input" id="licenseInput" placeholder="Paste your license key here"/>
        <div class="form-hint">Don't have a license? <a href="https://dodo.pe/datasaverpro" target="_blank" style="color: var(--accent);">Get one here</a></div>
      </div>

      <button type="submit" class="btn btn-primary btn-full">Save & Activate</button>
    </form>

    <button class="btn btn-secondary" id="editProfileBtn" style="margin-top: 16px;">Edit Profile</button>
    <button class="btn btn-danger" id="logoutBtn" style="margin-top: 8px; display: none;">Logout</button>
  </div>

  <!-- PRIVACY SETTINGS -->
  <div class="section">
    <div class="section-title">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
      </svg>
      Privacy Settings
    </div>

    <div class="settings-grid" id="privacySettings">
      <!-- Filled by JS -->
    </div>

    <button class="btn btn-secondary btn-full" id="savePrivacyBtn" style="margin-top: 20px;">Save Privacy Settings</button>
  </div>

  <!-- THEME SETTINGS -->
  <div class="section">
    <div class="section-title">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/>
      </svg>
      Appearance
    </div>

    <div class="settings-grid">
      <label class="setting-toggle">
        <input type="radio" name="theme" value="light"/>
        <div class="setting-info">
          <div class="setting-name">Light</div>
          <div class="setting-desc">Bright interface</div>
        </div>
      </label>
      <label class="setting-toggle">
        <input type="radio" name="theme" value="dark" checked/>
        <div class="setting-info">
          <div class="setting-name">Dark</div>
          <div class="setting-desc">Dark interface</div>
        </div>
      </label>
      <label class="setting-toggle">
        <input type="radio" name="theme" value="system"/>
        <div class="setting-info">
          <div class="setting-name">System</div>
          <div class="setting-desc">Follow OS setting</div>
        </div>
      </label>
    </div>

    <button class="btn btn-secondary btn-full" id="saveThemeBtn" style="margin-top: 20px;">Save Theme</button>
  </div>

  <!-- ACTIONS -->
  <div class="section">
    <div class="section-title">Actions</div>
    <button class="btn btn-secondary btn-full">Open Stats Dashboard</button>
    <button class="btn btn-secondary btn-full" style="margin-top: 12px;" id="openDocsBtn">View Documentation</button>
    <button class="btn btn-danger btn-full" style="margin-top: 12px;" id="resetExtBtn">Reset Extension</button>
  </div>

</div>

<script src="profile.js"></script>
</body>
</html>
